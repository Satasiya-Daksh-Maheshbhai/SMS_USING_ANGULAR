<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-9 col-xl-8">
      <div class="card border-0 shadow-lg login-card">
        <div class="card-body p-4 p-md-5">
          <div class="text-center mb-4">
            <h1 class="h3 fw-bold text-white mb-1">Student Management Portal</h1>
            <p class="text-light mb-0">Login Your Account Here.</p>
          </div>

          <div class="d-flex justify-content-center gap-2 mb-4">
            <button class="btn" [ngClass]="loginMode === 'student' ? 'btn-warning' : 'btn-outline-light'" (click)="setMode('student')">
              Student Login
            </button>
            <button class="btn" [ngClass]="loginMode === 'admin' ? 'btn-warning' : 'btn-outline-light'" (click)="setMode('admin')">
              Admin Login
            </button>
          </div>

          @if (errorMessage) {
            <div class="alert alert-danger py-2">{{ errorMessage }}</div>
          }

          @if (loginMode === 'student') {
            <form [formGroup]="studentForm" (ngSubmit)="submitStudent()" class="bg-white rounded-4 p-4">
              <h2 class="h5 mb-3">Student Access</h2>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" formControlName="email" placeholder="student@mail.com" />
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" formControlName="password" placeholder="Password" />
              </div>

              <button type="submit" class="btn btn-primary w-100">Login as Student</button>
            </form>
          }

          @if (loginMode === 'admin') {
            <form [formGroup]="adminForm" (ngSubmit)="submitAdmin()" class="bg-white rounded-4 p-4">
              <h2 class="h5 mb-3">Administrator Access</h2>

              <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" formControlName="username" placeholder="admin" />
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" formControlName="password" placeholder="Password" />
              </div>

              <button type="submit" class="btn btn-dark w-100">Login as Admin</button>
            </form>
          }
        </div>
      </div>
    </div>
  </div>
</div>
